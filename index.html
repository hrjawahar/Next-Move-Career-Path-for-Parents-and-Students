<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MyCareerReflection – TN</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-800">
<div class="max-w-4xl mx-auto p-4">

  <!-- Header Bar -->
  <div class="flex justify-between items-center mb-4">
    <div class="text-xs font-medium">TN Pilot • v1.2</div>
    <div class="flex gap-2">
      <a href="https://docs.google.com/forms/d/1EWr-LBGX4SCwA6HnqIxiIx6zDP2Cum9ZgC8yxR8B5wU/viewform"
         target="_blank"
         class="text-xs px-3 py-2 bg-white border rounded hover:bg-gray-100">
         Feedback
      </a>
      <select id="lang" class="text-xs border rounded p-2 bg-white">
        <option value="en">English</option>
        <option value="ta">தமிழ்</option>
      </select>
    </div>
  </div>

  <!-- Disclaimer -->
  <div id="disclaimer" class="bg-yellow-100 border border-yellow-200 p-3 text-xs rounded mb-4"></div>

  <!-- Title -->
  <h1 id="title" class="text-xl font-semibold text-center mb-6"></h1>

  <!-- Mode -->
  <div class="flex gap-3 justify-center mb-6">
    <button onclick="setMode('10')" class="px-4 py-2 bg-blue-600 text-white rounded">10th</button>
    <button onclick="setMode('12')" class="px-4 py-2 bg-green-600 text-white rounded">12th</button>
  </div>

  <!-- Form -->
  <div id="formSection" class="hidden space-y-3">

    <input id="studentName" class="w-full border p-2 rounded" placeholder="Student Name" />
    <input id="schoolName" class="w-full border p-2 rounded" placeholder="School / College" />
    <input id="marks" type="number" class="w-full border p-2 rounded" placeholder="Total Marks" />

    <select id="interest" class="w-full border p-2 rounded">
      <option value="">Interest</option>
      <option value="ai">AI</option>
      <option value="datascience">Data Science</option>
      <option value="cse">Computer Science</option>
      <option value="engineering">Engineering</option>
      <option value="commerce">Commerce</option>
      <option value="medical">Medical</option>
    </select>

    <select id="district" class="w-full border p-2 rounded">
      <option value="">District (optional)</option>
    </select>

    <button onclick="toggleDecision()" class="w-full bg-purple-600 text-white py-2 rounded">
      Need Suggestion?
    </button>

  </div>

  <!-- Results -->
  <div id="results" class="mt-6 space-y-3"></div>

</div>

<script>

/* ----------------------------
   TRANSLATION (minimal stable)
-----------------------------*/
const translations = {
  en: {
    title: "MyCareerReflection – TN Decision Engine",
    disclaimer: "Indicative suggestions only. Final admission depends on official counselling and institutional policies."
  },
  ta: {
    title: "MyCareerReflection – தமிழ்நாடு வழிகாட்டு அமைப்பு",
    disclaimer: "இது வழிகாட்டும் பரிந்துரைகள் மட்டும். இறுதி சேர்க்கை அதிகாரப்பூர்வ ஆலோசனை மற்றும் விதிமுறைகளின் அடிப்படையில் இருக்கும்."
  }
};

let LANG = "en";

document.getElementById("lang").addEventListener("change", function(){
  LANG = this.value;
  applyLanguage();
});

function applyLanguage(){
  document.getElementById("title").innerText = translations[LANG].title;
  document.getElementById("disclaimer").innerText = translations[LANG].disclaimer;
}
applyLanguage();

/* ----------------------------
   MODE
-----------------------------*/
let currentMode = null;

function setMode(mode){
  currentMode = mode;
  document.getElementById("formSection").classList.remove("hidden");
}

/* ----------------------------
   DATA LOAD
-----------------------------*/
let colleges = [];
let districtList = [];

async function loadCollegeData(){
  try{
    const res = await fetch("./data/tn-colleges.json", { cache: "no-store" });
    const data = await res.json();

    if(!Array.isArray(data)) throw new Error("Invalid JSON");

    colleges = data;

    districtList = [...new Set(
      colleges.map(c => c.district).filter(Boolean)
    )].sort();

    populateDistricts();

  }catch(e){
    document.getElementById("results").innerHTML =
      `<div class="bg-white border p-3 rounded text-sm">
        Could not load college data. Check JSON path.
       </div>`;
  }
}

function populateDistricts(){
  const sel = document.getElementById("district");
  sel.innerHTML = `<option value="">District (optional)</option>`;

  districtList.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    sel.appendChild(opt);
  });
}

loadCollegeData();

/* ----------------------------
   INTEREST TAG MAP
-----------------------------*/
const interestTags = {
  ai: ["ai","ml","datascience","computing"],
  datascience:["datascience","statistics","analytics"],
  cse:["cse","computing","software"],
  engineering:["engineering","mechanical","eee","civil"],
  commerce:["commerce","finance","business"],
  medical:["medical","biology","health"]
};

/* ----------------------------
   DECISION ENGINE
-----------------------------*/
function toggleDecision(){

  const marks = Number(document.getElementById("marks").value);
  const interest = document.getElementById("interest").value;
  const district = document.getElementById("district").value;

  if(!currentMode || !marks || !interest){
    alert("Enter required fields");
    return;
  }

  const band = getBand(marks);
  const wanted = new Set(interestTags[interest] || []);

  const pool = district
    ? colleges.filter(c => c.district === district)
    : colleges;

  const scored = pool
    .map(college => scoreCollege(college, wanted, band))
    .filter(x => x.matchPrograms.length > 0)
    .sort((a,b) => b.score - a.score);

  renderResults(scored.slice(0,10));
}

function getBand(marks){
  if(currentMode === "12"){
    if(marks >= 580) return 5;
    if(marks >= 540) return 4;
    if(marks >= 480) return 3;
    if(marks >= 400) return 2;
    return 1;
  } else {
    if(marks >= 450) return 5;
    if(marks >= 400) return 4;
    if(marks >= 350) return 3;
    if(marks >= 300) return 2;
    return 1;
  }
}

function scoreCollege(college, wantedTags, band){

  const matches = [];

  (college.programs || []).forEach(p=>{
    const overlap = (p.tags || []).filter(t => wantedTags.has(t)).length;
    if(overlap > 0){
      matches.push(p.name);
    }
  });

  const tier = college.tier || 3;
  const score = matches.length * 10 + band * 5 + (3 - tier) * 2;

  return { ...college, score, matchPrograms: matches };
}

/* ----------------------------
   RENDER
-----------------------------*/
function renderResults(list){

  const container = document.getElementById("results");
  container.innerHTML = "";

  if(!list.length){
    container.innerHTML =
      `<div class="bg-white border p-3 rounded text-sm">
         No matching colleges found.
       </div>`;
    return;
  }

  list.forEach(item=>{

    const collegeName =
      item.name ||
      item.collegeName ||
      item.institution ||
      "College";

    const div = document.createElement("div");
    div.className = "bg-white border p-3 rounded";

    div.innerHTML = `
      <div class="font-semibold">${collegeName}</div>
      <div class="text-xs text-gray-500">
        ${item.city || ""}${item.city && item.district ? ", " : ""}${item.district || ""}
        • Tier ${item.tier || ""}
      </div>
      <div class="text-xs mt-2">${item.matchPrograms.join(", ")}</div>
      ${item.website ? `<a href="${item.website}" target="_blank" class="text-blue-600 text-xs mt-2 inline-block">Website</a>` : ""}
    `;

    container.appendChild(div);
  });
}

</script>
</body>
</html>
